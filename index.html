<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Viewer 3D</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #e9e9e9; }
    canvas { display: block; }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(255,255,255,0.9);
      padding: 8px 10px;
      font: 14px Arial, sans-serif;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="info">Chargement...</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.161.0/examples/jsm/loaders/GLTFLoader.js';

    const info = document.getElementById('info');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf2f2f2);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x666666, 2);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 2);
    dir.position.set(5, 10, 7);
    scene.add(dir);

    const grid = new THREE.GridHelper(10, 10);
    scene.add(grid);

    const axes = new THREE.AxesHelper(2);
    scene.add(axes);

    const loader = new GLTFLoader();

    loader.load(
      './BEARBRICK.glb',
      (gltf) => {
        console.log('MODEL OK');

        const model = gltf.scene;
        scene.add(model);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);

        model.position.x -= center.x;
        model.position.y -= center.y;
        model.position.z -= center.z;

        controls.target.set(0, 0, 0);

        const distance = maxDim * 2.5 || 5;
        camera.position.set(distance * 0.7, distance * 0.4, distance);
        camera.lookAt(0, 0, 0);
        controls.update();

        info.textContent =
          `OK | size: ${size.x.toFixed(2)} / ${size.y.toFixed(2)} / ${size.z.toFixed(2)}`;
      },
      (xhr) => {
        if (xhr.total) {
          const p = (xhr.loaded / xhr.total * 100).toFixed(0);
          info.textContent = `Chargement ${p}%`;
        }
      },
      (error) => {
        console.error('ERREUR GLB :', error);
        info.textContent = 'Erreur chargement GLB. Voir F12 > Console.';
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
