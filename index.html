<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Viewer 3D diagnostic</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #d9d9d9; }
    canvas { display: block; }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      background: rgba(255,255,255,0.95);
      padding: 8px 10px;
      font: 14px Arial, sans-serif;
      border-radius: 6px;
      color: #111;
    }
  </style>
</head>
<body>
  <div id="info">Initialisation…</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.161.0/examples/jsm/loaders/GLTFLoader.js';

    const info = document.getElementById('info');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe8e8e8);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 5000);
    camera.position.set(2, 2, 6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 3);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 2);
    dir1.position.set(10, 10, 10);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 1.5);
    dir2.position.set(-10, 5, -10);
    scene.add(dir2);

    const grid = new THREE.GridHelper(10, 10);
    scene.add(grid);

    const axes = new THREE.AxesHelper(2);
    scene.add(axes);

    // Cube rouge de contrôle : s’il apparaît, le moteur fonctionne.
    const testCube = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 0.5, 0.5),
      new THREE.MeshStandardMaterial({ color: 0xff0000 })
    );
    testCube.position.set(0, 0.25, 0);
    scene.add(testCube);

    info.textContent = 'Moteur OK, chargement du GLB…';

    const loader = new GLTFLoader();

    loader.load(
      './BEARBRICK.glb',
      (gltf) => {
        const model = gltf.scene;
        scene.add(model);

        let meshCount = 0;
        model.traverse((obj) => {
          if (obj.isMesh) {
            meshCount++;
            obj.castShadow = true;
            obj.receiveShadow = true;

            // Fallback brutal pour voir si le matériau original pose problème
            if (!obj.material) {
              obj.material = new THREE.MeshStandardMaterial({ color: 0xcccccc });
            }
          }
        });

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);

        // Recentrage absolu
        model.position.x -= center.x;
        model.position.y -= center.y;
        model.position.z -= center.z;

        // Recalcule après recentrage
        const box2 = new THREE.Box3().setFromObject(model);
        const size2 = box2.getSize(new THREE.Vector3());
        const maxDim2 = Math.max(size2.x, size2.y, size2.z) || 1;

        controls.target.set(0, 0, 0);

        const dist = maxDim2 * 2.2;
        camera.position.set(dist * 0.8, dist * 0.5, dist);
        camera.near = Math.max(0.001, maxDim2 / 1000);
        camera.far = Math.max(1000, maxDim2 * 50);
        camera.updateProjectionMatrix();
        camera.lookAt(0, 0, 0);
        controls.update();

        info.textContent =
          `GLB OK | meshes: ${meshCount} | size: ${size2.x.toFixed(3)} / ${size2.y.toFixed(3)} / ${size2.z.toFixed(3)}`;
        console.log('MODEL OK');
        console.log('meshCount =', meshCount);
        console.log('size =', size2);
      },
      (xhr) => {
        if (xhr.total) {
          const p = (xhr.loaded / xhr.total * 100).toFixed(0);
          info.textContent = `Chargement du GLB : ${p}%`;
        }
      },
      (error) => {
        console.error('ERREUR GLB :', error);
        info.textContent = 'Erreur chargement GLB. Ouvre F12 > Console.';
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      testCube.rotation.y += 0.01;
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
